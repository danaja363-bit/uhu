<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>DANZ PAYMENT | Setor Dana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://cdn.phototourl.com/free/2026-06-15-37c1d862-eff7-4b79-908c-05d8a25b8e2d.jpg') no-repeat center center/cover fixed;
            backdrop-filter: brightness(0.85) blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 500px;
            width: 100%;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 28px 22px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .music-player {
            background: rgba(0, 0, 0, 0.55);
            border-radius: 100px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(255, 215, 0, 0.3);
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-icon { font-size: 28px; }
        .song-title { color: white; font-weight: 600; font-size: 14px; }
        .song-artist { font-size: 11px; color: #ccc; }

        .play-btn {
            background: gold;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            color: #1a1a2e;
            font-weight: bold;
        }
        .play-btn:active { transform: scale(0.94); }

        .title { text-align: center; margin-bottom: 28px; }
        .title h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title p { color: rgba(255,255,240,0.8); font-size: 14px; margin-top: 6px; }

        .payment-form { display: flex; flex-direction: column; gap: 18px; margin: 20px 0 24px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: #FFD966;
        }
        .input-group input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #FFD966;
            padding: 14px 16px;
            border-radius: 28px;
            color: white;
            font-size: 15px;
            outline: none;
        }
        .input-group input:focus { border-color: gold; box-shadow: 0 0 8px gold; }

        .amount-box {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 28px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        .amount-label { color: #FFD966; font-weight: 600; }
        .amount-input {
            flex: 2;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid gold;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: right;
        }
        .currency { color: #FFD966; font-weight: bold; }

        .btn-pay {
            background: linear-gradient(95deg, #e6b800, #ff9500);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            margin-top: 6px;
            cursor: pointer;
            width: 100%;
        }
        .btn-pay:active { transform: scale(0.97); }

        .wa-button, .dana-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border: none;
        }
        .wa-button { background: #25D366; }
        .dana-button { background: #1A9CFF; }
        .wa-button:active { transform: scale(0.97); background: #128C7E; }
        .dana-button:active { transform: scale(0.97); background: #0a6fc7; }

        .modal-struk {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-struk.show { visibility: visible; opacity: 1; }
        .struk-card {
            background: #fef9e6;
            max-width: 340px;
            width: 85%;
            border-radius: 32px;
            padding: 24px 20px;
            color: #2c2c2c;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 2px solid #ffcd7e;
        }
        .struk-card h3 {
            font-size: 26px;
            font-weight: 800;
            border-bottom: 2px dashed #e6b800;
            display: inline-block;
            padding-bottom: 6px;
            margin-bottom: 18px;
        }
        .struk-detail {
            text-align: left;
            margin: 16px 0;
            font-size: 15px;
            line-height: 1.7;
            background: #fff6e0;
            padding: 14px;
            border-radius: 24px;
        }
        .close-struk {
            background: #e6b800;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 12px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            font-size: 11px;
            color: #aaa;
            margin-top: 20px;
        }

        @media (max-width: 460px) { .container { padding: 20px 18px; } }
    </style>
</head>
<body>

<div class="container">
    <!-- Music player -->
    <div class="music-player">
        <div class="song-info">
            <span class="music-icon">🎧</span>
            <div>
                <div class="song-title">Golden Brown</div>
            </div>
        </div>
        <button class="play-btn" id="playPauseBtn">▶</button>
    </div>

    <div class="title">
        <h1>💸 DANZ PAYMENT</h1>
        <p>isi saldo / bayar tagihan</p>
    </div>

    <!-- Bagian 1: Data pembayar (customer) -->
    <div class="payment-form">
        <div class="input-group">
            <label>👤 Nama pembayar</label>
            <input type="text" id="customerName" placeholder="Nama Anda">
        </div>
        <div class="input-group">
            <label>📞 No. HP pembayar</label>
            <input type="tel" id="customerPhone" placeholder="08123456789">
        </div>
        <div class="amount-box">
            <span class="amount-label">💰 Jumlah transfer</span>
            <div style="flex:2; display:flex; align-items:center; gap:6px;">
                <span class="currency">Rp</span>
                <input type="number" id="amountNumber" class="amount-input" placeholder="50000" value="50000">
            </div>
        </div>
    </div>

    <!-- Bagian 2: Data penerima (milik ANDA) -->
    <div style="margin: 16px 0 8px; border-top: 1px dashed #FFD966; padding-top: 16px;">
        <p style="color:#FFD966; font-size:12px; margin-bottom:10px;">🔐 Tujuan transfer (akun penerima, data Anda sendiri)</p>
        <div class="input-group">
            <label>📱 WhatsApp pemilik (Anda)</label>
            <input type="tel" id="ownerWhatsapp" placeholder="6283184341795">
        </div>
        <div class="input-group">
            <label>💳 Nomor DANA pemilik (Anda)</label>
            <input type="tel" id="ownerDana" placeholder="083194058051">
        </div>
    </div>

    <button class="btn-pay" id="payBtn">✅ Bayar & Dapatkan Struk</button>

    <!-- Tombol kontak langsung ke WA dan DANA (menggunakan nomor pemilik) -->
    <button class="wa-button" id="contactWaBtn">💬 Hubungi WhatsApp</button>
    <button class="dana-button" id="contactDanaBtn">💳 Transfer via DANA</button>

    <footer>🔒 Simulasi pembayaran • Data tersimpan sementara</footer>
</div>

<!-- Modal struk -->
<div id="receiptModal" class="modal-struk">
    <div class="struk-card">
        <h3>🧾 STRUK PEMBAYARAN</h3>
        <div class="struk-detail" id="strukContent"></div>
        <button class="close-struk" id="closeStrukBtn">Tutup</button>
    </div>
</div>

<script>
    // 1. LAGU
    const audio = new Audio('https://alright-azure-cx8xteii.edgeone.app/AUD-20260429-WA0221.mp3');
    audio.loop = true;
    audio.volume = 0.4;
    const playBtn = document.getElementById('playPauseBtn');
    let isPlaying = false;

    playBtn.addEventListener('click', () => {
        if (!isPlaying) {
            audio.play().catch(() => {});
            playBtn.innerHTML = '⏸';
            isPlaying = true;
        } else {
            audio.pause();
            playBtn.innerHTML = '▶';
            isPlaying = false;
        }
    });
    // autoplay (interaksi pertama)
    document.body.addEventListener('touchstart', function once() {
        audio.play().then(() => {
            isPlaying = true;
            playBtn.innerHTML = '⏸';
        }).catch(() => {});
        document.body.removeEventListener('touchstart', once);
    }, { once: true });

    // 2. Generate struk
    const modal = document.getElementById('receiptModal');
    const strukDiv = document.getElementById('strukContent');
    const closeStruk = document.getElementById('closeStrukBtn');

    function generateStrukHTML(pembayarNama, pembayarHP, jumlah, waOwner, danaOwner) {
        const trxId = 'DANZ' + Date.now().toString().slice(-8);
        const tgl = new Date().toLocaleString('id-ID');
        return `
            <div style="font-family: monospace; font-size: 14px;">
                <strong>🆔 ID Transaksi</strong> : ${trxId}<br>
                <strong>📅 Tanggal</strong> : ${tgl}<br>
                <strong>👤 Nama Pembayar</strong> : ${pembayarNama || "Pelanggan"}<br>
                <strong>📞 No. HP Pembayar</strong> : ${pembayarHP || "-"}<br>
                <strong>💰 Jumlah Transfer</strong> : Rp ${Number(jumlah).toLocaleString('id-ID')}<br>
                <hr style="border-top:1px dashed #e6b800; margin:12px 0;">
                <strong>📱 Kirim ke WhatsApp</strong> : ${waOwner || "belum diisi"}<br>
                <strong>💳 Kirim ke DANA</strong> : ${danaOwner || "belum diisi"}<br>
                <hr style="border-top:1px dashed #e6b800; margin:12px 0;">
                <span style="color:#b45f06;">✅ Pembayaran Berhasil (Simulasi)</span><br>
                <small>Terima kasih, segera konfirmasi via WA/DANA</small>
            </div>
        `;
    }

    document.getElementById('payBtn').addEventListener('click', () => {
        const nama = document.getElementById('customerName').value.trim();
        const hp = document.getElementById('customerPhone').value.trim();
        const amount = parseInt(document.getElementById('amountNumber').value, 10);
        const waOwner = document.getElementById('ownerWhatsapp').value.trim();
        const danaOwner = document.getElementById('ownerDana').value.trim();

        if (!nama) { alert("Nama pembayar wajib diisi"); return; }
        if (!hp) { alert("No. HP pembayar wajib diisi"); return; }
        if (isNaN(amount) || amount <= 0) { alert("Jumlah transfer harus lebih dari 0"); return; }

        const struk = generateStrukHTML(nama, hp, amount, waOwner || "(belum diisi)", danaOwner || "(belum diisi)");
        strukDiv.innerHTML = struk;
        modal.classList.add('show');
    });

    closeStruk.addEventListener('click', () => modal.classList.remove('show'));
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

    // 3. Tombol kontak WA & DANA (memanggil nomor pemilik yang sudah diisi)
    const contactWa = document.getElementById('contactWaBtn');
    const contactDana = document.getElementById('contactDanaBtn');

    contactWa.addEventListener('click', () => {
        let waOwnerNum = document.getElementById('ownerWhatsapp').value.trim();
        if (!waOwnerNum) {
            alert("Isi dulu nomor WhatsApp pemilik (Anda) pada kolom di atas");
            return;
        }
        // pastikan format internasional (62xxx) bisa langsung digunakan
        let cleanNum = waOwnerNum.replace(/\D/g, '');
        if (!cleanNum.startsWith('62') && !cleanNum.startsWith('0')) {
            alert("Gunakan format 628xxx atau 08xxx");
            return;
        }
        if (cleanNum.startsWith('0')) cleanNum = '62' + cleanNum.slice(1);
        const msg = "Halo, saya sudah melakukan pembayaran. Mohon diproses.";
        window.open(`https://wa.me/${cleanNum}?text=${encodeURIComponent(msg)}`, '_blank');
    });

    contactDana.addEventListener('click', () => {
        let danaNum = document.getElementById('ownerDana').value.trim();
        if (!danaNum) {
            alert("Isi dulu nomor DANA pemilik (Anda) pada kolom di atas");
            return;
        }
        // DANA menggunakan nomor hp biasa (bisa pakai skema tel: atau buka aplikasi)
        // Karena tidak ada deep link universal, kita hanya menampilkan nomor agar user bisa transfer manual
        alert(`Silakan transfer ke nomor DANA: ${danaNum}\nSetelah transfer, konfirmasi via WhatsApp.`);
    });
</script>
</body>
</html>
